{% extends 'base.html' %}

{% block title %}AI 영화 추천 챗봇 - myMovieReviews{% endblock %}

{% block content %}
<style>
    .chatbot-container {
        background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
        border-radius: 20px;
        padding: 3px;
    }
    .chatbot-inner {
        background-color: #1a1a1a;
        border-radius: 18px;
        padding: 30px;
    }
    .chat-header {
        text-align: center;
        margin-bottom: 30px;
    }
    .chat-box {
        background-color: #000;
        border: 2px solid #333;
        border-radius: 15px;
        height: 500px;
        overflow-y: auto;
        padding: 20px;
        margin-bottom: 20px;
    }
    .chat-box::-webkit-scrollbar {
        width: 8px;
    }
    .chat-box::-webkit-scrollbar-track {
        background: #1a1a1a;
    }
    .chat-box::-webkit-scrollbar-thumb {
        background: #00ff00;
        border-radius: 4px;
    }
    .welcome-box {
        background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        border: 2px solid #00ff00;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
    }
    .suggestion-btn {
        background-color: transparent;
        border: 1px solid #00ff00;
        color: #00ff00;
        border-radius: 20px;
        padding: 8px 15px;
        margin: 5px;
        font-size: 0.9rem;
        transition: all 0.3s;
    }
    .suggestion-btn:hover {
        background-color: #00ff00;
        color: #000;
    }
    .message-user {
        background-color: #00ff00;
        color: #000;
        padding: 12px 18px;
        border-radius: 15px 15px 5px 15px;
        margin-bottom: 10px;
        max-width: 70%;
        margin-left: auto;
        font-weight: 500;
    }
    .message-bot {
        background-color: #2a2a2a;
        color: #fff;
        padding: 12px 18px;
        border-radius: 15px 15px 15px 5px;
        margin-bottom: 10px;
        max-width: 70%;
        border: 1px solid #444;
    }
    .chat-input {
        background-color: #000;
        border: 2px solid #00ff00;
        color: #fff;
        border-radius: 25px;
        padding: 12px 20px;
    }
    .chat-input:focus {
        background-color: #000;
        border-color: #00ff00;
        color: #fff;
        box-shadow: 0 0 0 0.2rem rgba(0, 255, 0, 0.25);
    }
    .send-btn {
        background-color: #00ff00;
        color: #000;
        border: none;
        border-radius: 25px;
        padding: 12px 30px;
        font-weight: bold;
        transition: all 0.3s;
    }
    .send-btn:hover {
        background-color: #00cc00;
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
    }
    .send-btn:disabled {
        background-color: #666;
        color: #333;
    }
</style>

<div class="row">
    <div class="col-md-10 mx-auto">
        <div class="chatbot-container">
            <div class="chatbot-inner">
                <div class="chat-header">
                    <h2 style="font-size:2rem; font-weight:bold;">
                        <span style="color:#00ff00;">Wat</span><span style="color:#fff;">Bot</span>
                    </h2>
                    <p style="color: #888; font-size: 0.95rem;">by Watlog · 내 리뷰 기반 AI 영화 추천</p>
                </div>

                <div class="chat-box" id="chatMessages">
                    <div class="welcome-box">
                        <h5 style="color: #00ff00; margin-bottom: 15px;">✨ WatBot</h5>
                        <p style="margin-bottom: 15px;">
                            안녕하세요! 당신이 본 영화 리뷰를 바탕으로 영화를 추천해드립니다.<br>
                            어떤 영화를 찾고 계신가요?
                        </p>
                        <div class="text-center">
                            <button class="suggestion-btn" onclick="sendSuggestion('액션 영화 추천해줘')">액션 영화 추천</button>
                            <button class="suggestion-btn" onclick="sendSuggestion('로맨스 영화 알려줘')">로맨스 영화</button>
                            <button class="suggestion-btn" onclick="sendSuggestion('고평점 영화 추천')">고평점 영화</button>
                            <button class="suggestion-btn" onclick="sendSuggestion('최신 영화 보여줘')">최신 영화</button>
                            <button class="suggestion-btn" onclick="sendSuggestion('SF 영화 추천해줘')">SF 영화 추천</button>
                        </div>
                    </div>
                </div>

                <form id="chatForm" class="d-flex">
                    <input type="text" id="userInput" class="form-control chat-input me-3" placeholder="영화에 대해 물어보세요..." required>
                    <button type="submit" class="btn send-btn" id="sendBtn">전송</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
const chatMessages = document.getElementById('chatMessages');
const chatForm = document.getElementById('chatForm');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
let conversationHistory = [];

function sendSuggestion(text) {
    userInput.value = text;
    chatForm.dispatchEvent(new Event('submit'));
}

chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const message = userInput.value.trim();
    if (!message) return;
    
    addMessage(message, 'user');
    userInput.value = '';
    sendBtn.disabled = true;
    sendBtn.textContent = '전송중...';

    conversationHistory.push({role: 'user', content: message});

    const loadingDiv = addLoadingMessage();

    try {
        const response = await fetch('{% url "reviews:chatbot_api" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({
                message: message,
                history: conversationHistory
            })
        });

        const data = await response.json();
        loadingDiv.remove();
        addMessage(data.response, 'assistant');
        conversationHistory.push({role: 'assistant', content: data.response});

    } catch (error) {
        loadingDiv.remove();
        addMessage('죄송합니다. 오류가 발생했습니다. API 키를 확인해주세요.', 'assistant');
    }

    sendBtn.disabled = false;
    sendBtn.textContent = '전송';
});

function addMessage(text, role) {
    const messageDiv = document.createElement('div');
    messageDiv.className = role === 'user' ? 'message-user' : 'message-bot';
    messageDiv.textContent = text;
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addLoadingMessage() {
    const div = document.createElement('div');
    div.className = 'message-bot';
    div.innerHTML = '<span id="loadingDots">🤖 응답 중<span class="dots">...</span></span>';
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    let count = 0;
    div._interval = setInterval(() => {
        count = (count + 1) % 4;
        const dots = div.querySelector('.dots');
        if (dots) dots.textContent = '.'.repeat(count);
    }, 400);
    return { remove() { clearInterval(div._interval); div.remove(); } };
}
</script>
{% endblock %}
