<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Watlog{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
        }
        
        /* 헤더 스타일 */
        .main-header {
            background-color: #000;
            border-bottom: 2px solid #00ff00;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
        }
        
        .logo-my {
            color: #fff;
        }
        
        .logo-movie {
            color: #ff0000;
        }
        
        .logo-reviews {
            color: #fff;
        }
        
        .header-nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .nav-btn {
            background-color: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .nav-btn:hover {
            background-color: #00ff00;
            color: #000;
        }
        
        .nav-btn-primary {
            background-color: #00ff00;
            color: #000;
            border: none;
        }
        
        .nav-btn-primary:hover {
            background-color: #00cc00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="main-header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <a href="{% url 'reviews:review_list' %}" class="logo">
                    <span style="color:#00ff00;">Wat</span><span style="color:#fff;">log</span>
                </a>
                <nav class="header-nav">
                    <a href="{% url 'reviews:review_list' %}" class="nav-btn">전체 리뷰</a>
                    <a href="{% url 'reviews:review_create' %}" class="nav-btn-primary nav-btn">+ 새 리뷰</a>
                    <a href="{% url 'reviews:chatbot' %}" class="nav-btn">챗봇 추천</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
