<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>북마크 매니저</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            max-width: 700px;
            margin: 0 auto;
        }

        .form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .form input {
            flex: 1;
            padding: 0.5rem;
        }

        button {
            padding: 0.5rem 1rem;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
        }

        .name {
            flex: 1;
            cursor: pointer;
            color: #0066cc;
        }

        .name:hover {
            text-decoration: underline;
        }

        .star {
            cursor: pointer;
            user-select: none;
            color: #ccc;
            font-size: 1.2rem;
        }

        .star.active {
            color: gold;
        }

        .delete-btn {
            background: #ff5252;
            color: white;
            border: none;
            padding: 0.3rem 0.6rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>나의 북마크</h1>
    <div class="form">
        <input type="text" id="nameInput" placeholder="사이트 이름">
        <input type="url" id="urlInput" placeholder="https://...">
        <button id="addBtn">추가</button>
    </div>
    <ul id="bookmarkList"></ul>

    <script>
        const nameInput = document.querySelector('#nameInput');
        const urlInput = document.querySelector('#urlInput');
        const addBtn = document.querySelector('#addBtn');
        const list = document.querySelector('#bookmarkList');

        // 데이터 모델: [{ id, name, url, starred }, ...]
        let bookmarks = [];

        // localStorage에 저장된 북마크 데이터를 불러와 bookmarks에 저장
        bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];
        if (typeof render === 'function') render();

        // bookmarks 배열을 HTML 목록으로 변환해 화면에 출력
        function render() {
            // 즐겨찾기한 북마크가 목록 위쪽에 먼저 보이도록 정렬
            const sortedBookmarks = [...bookmarks].sort((a, b) => b.starred - a.starred);

            list.innerHTML = sortedBookmarks.map(b => `
                <li data-id="${b.id}">
                    <span class="star ${b.starred ? 'active' : ''}">★</span>
                    <span class="name">${b.name}</span>
                    <button class="delete-btn">삭제</button>
                </li>
            `).join('');
        }

        // 추가 버튼 클릭 시 입력값을 북마크 목록에 저장하고 화면을 갱신
        addBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            const url = urlInput.value.trim();

            if (!name || !url) return;

            // URL이 http:// 또는 https://로 시작하지 않으면 다시 입력하도록 안내
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert('다시 입력하세요.');
                return;
            }

            bookmarks.push({
                id: Date.now(),
                name,
                url,
                starred: false
            });

            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            nameInput.value = '';
            urlInput.value = '';
            render();
        });

        // 목록 클릭 이벤트 하나로 별표 토글, 삭제, 사이트 열기를 처리
        list.addEventListener('click', e => {
            const li = e.target.closest('li');
            if (!li) return;

            const id = Number(li.dataset.id);
            const bookmark = bookmarks.find(b => b.id === id);
            if (!bookmark) return;

            if (e.target.classList.contains('star')) {
                bookmark.starred = !bookmark.starred;
            } else if (e.target.classList.contains('delete-btn')) {
                bookmarks = bookmarks.filter(b => b.id !== id);
            } else if (e.target.classList.contains('name')) {
                window.open(bookmark.url, '_blank');
                return;
            } else {
                return;
            }

            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            render();
        });
    </script>
</body>

</html>
