<!DOCTYPE html>

    <style>
        body {

            margin: 0 auto;

        .form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .form input {
            flex: 1;
            padding: 0.5rem;
        }

        button {
            padding: 0.5rem 1rem;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
        }

        .name {
            flex: 1;
            cursor: pointer;
            color: #0066cc;
        }

        .name:hover {
            text-decoration: underline;
        }

        .star {
            cursor: pointer;
            user-select: none;
            color: #ccc;
            font-size: 1.2rem;
        }

        .star.active {
            color: gold;
        }

        .delete-btn {
