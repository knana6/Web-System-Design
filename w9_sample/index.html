<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>W9 Sample Index</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen font-sans">
  <div class="flex h-screen">
    <nav class="w-64 bg-slate-800 text-slate-100 py-5 overflow-y-auto flex-shrink-0">
      <h2 class="px-5 pb-4 text-lg font-semibold border-b border-slate-700 mb-3">W9 Samples</h2>
      <ul id="file-list">
        <li><a href="#" data-file="01-dom-list.html"
            class="block px-5 py-3 text-slate-300 border-l-[3px] border-transparent hover:bg-slate-700 hover:text-white transition">01.
            DOM List</a></li>
        <li><a href="#" data-file="02-event-list.html"
            class="block px-5 py-3 text-slate-300 border-l-[3px] border-transparent hover:bg-slate-700 hover:text-white transition">02.
            Event List</a></li>
        <li><a href="#" data-file="03-bom-location.html"
            class="block px-5 py-3 text-slate-300 border-l-[3px] border-transparent hover:bg-slate-700 hover:text-white transition">03.
            BOM Location</a></li>
        <li><a href="#" data-file="04-timer.html"
            class="block px-5 py-3 text-slate-300 border-l-[3px] border-transparent hover:bg-slate-700 hover:text-white transition">04.
            Timer</a></li>
        <li><a href="#" data-file="05-darkmode.html"
            class="block px-5 py-3 text-slate-300 border-l-[3px] border-transparent hover:bg-slate-700 hover:text-white transition">05.
            Dark Mode</a></li>
      </ul>
    </nav>

    <main class="flex-1 flex flex-col bg-slate-50">
      <div
        class="px-5 py-3 bg-white border-b border-slate-200 text-sm text-slate-600 flex justify-between items-center">
        <span id="current-file">01-dom-list.html</span>
        <a id="open-new" href="01-dom-list.html" target="_blank" class="text-blue-600 hover:underline text-xs">새 창에서 열기
          ↗</a>
      </div>
      <iframe id="preview" src="01-dom-list.html" class="flex-1 w-full border-0 bg-white"></iframe>
    </main>
  </div>

  <script>
    const links = document.querySelectorAll('#file-list a');
    const preview = document.getElementById('preview');
    const currentFile = document.getElementById('current-file');
    const openNew = document.getElementById('open-new');

    const activeClasses = ['bg-slate-900', 'border-sky-400', 'text-white'];

    function activate(link) {
      const file = link.dataset.file;
      preview.src = file;
      currentFile.textContent = file;
      openNew.href = file;
      links.forEach(a => a.classList.remove(...activeClasses));
      link.classList.add(...activeClasses);
    }

    links.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        activate(link);
      });
    });

    activate(links[0]);
  </script>
</body>

</html>
